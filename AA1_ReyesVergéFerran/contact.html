<!DOCTYPE html>
<html lang="ca">

    <head>
        <meta charset="UTF-8">
        <title>Contacte</title>
        <link rel="stylesheet" href="style.css">
    </head>


    <body>

        <header>
            <nav>
                <ul>
                    <li><a href="index.html">Presentació</a></li>
                    <li><a href="hobbies.html">Aficions</a></li>
                    <li><a href="trivial.html">Joc</a></li>
                    <li><a href="contact.html">Contacte</a></li>
                </ul>
            </nav>
        </header>

        <main>

        <h1>Contacta amb mi</h1>

        <form>

            <label>Nom:</label>
            <input type="text" id="nom" required minlength="3">
            
            <label>Email:</label>
            <input type="email" id="email" required>
            
            <label>Edat:</label>
            <input type="number" id="edat" min="10" max="120" required>
            
            <label>Missatge:</label>
            <input type="text" id="missatge" required minlength="5">
            
            <button type="submit">Enviar</button>
            
            </form>

        </main>

        <script>

            const inputs = document.querySelectorAll("input");
            
            inputs.forEach(input => {
            
                input.addEventListener("input", function() {
            
                    if (input.checkValidity()) {
                        input.classList.remove("input-incorrecto");
                        input.classList.add("input-correcto");
                    } else {
                        input.classList.remove("input-correcto");
                        input.classList.add("input-incorrecto");
                    }
            
                });
            
            });
            
            </script>
    

    </body>
</html>
