<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <title>Trivial</title>
        <link rel="stylesheet" href="style.css">
    </head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Presentació</a></li>
                <li><a href="hobbies.html">Aficions</a></li>
                <li><a href="trivial.html">Joc</a></li>
                <li><a href="contact.html">Contacte</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="bloc-pregunta">
            <h2>Quin llenguatge s'utilitza per donar estil a una web?</h2>
            <!-- El class="resposta" es per a que java script pugui trobar les respostes-->
            <!-- El data-correcte="correcte" es una dada guardada a l'HTML-->
            <div class="resposta" data-correcte="incorrecte">HTML</div>
            <div class="resposta" data-correcte="correcte">CSS</div>
            <div class="resposta" data-correcte="incorrecte">Python</div>
            <div class="resposta" data-correcte="incorrecte">C++</div>
        </div>

        <div class="bloc-pregunta">
            <h2>Que significa JS?</h2>
            <div class="resposta" data-correcte="incorrecte">Java System</div>
            <div class="resposta" data-correcte="correcte">JavaScript</div>
            <div class="resposta" data-correcte="incorrecte">Just Style</div>
            <div class="resposta" data-correcte="incorrecte">Joint Script</div>
        </div>
    </main>
    <!-- Es posa al final per a que primer es carregui tot l'HTML -->
    <script>
        //El document.querySelectorAll(".resposta") busca totes les respostes que hi han
        const respostes = document.querySelectorAll(".resposta");
        
        respostes.forEach(resposta => {
            //El resposta.addEventListener("click") detecta quan clickes
            resposta.addEventListener("click", function() {
                //El resposta.dataset.correcte llegeix el data-correcte=""
                if (resposta.dataset.correcte === "correcte") {
        
                    resposta.classList.add("resposta-correcta");
        
                } else {
        
                    resposta.classList.add("resposta-incorrecta");
        
                }
        
            });
        
        });
        
        </script>
    </body>
</html>
